<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Dashboard</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 50px; }
        .dashboard-tiles { display: flex; gap: 20px; margin-bottom: 30px; }
        .tile { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #334155; min-width: 200px;}
        h3 { color: #94a3b8; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        p { font-size: 20px; font-weight: bold; margin: 0; color: #10b981; }
        .logout-btn { color: #ef4444; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 1px solid #ef4444; border-radius: 8px; display: inline-block;}
        .logout-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

<h1 style="border-left: 5px solid #10b981; padding-left: 15px; margin-bottom: 40px;">User Profile Dashboard</h1>

<div class="dashboard-tiles">
    <div class="tile">
        <h3>Username</h3>
        <p th:text="${user.username}">-</p>
    </div>
    <div class="tile">
        <h3>Full Name</h3>
        <p th:text="${profile.nama}">-</p>
    </div>
    <div class="tile">
        <h3>Address</h3>
        <p th:text="${profile.alamat}">-</p>
    </div>
</div>

<a th:href="@{/logout}" class="logout-btn">Sign Out</a>

</body>
</html>
